<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="head">
      <a class="name" href="index.html">Currency Converter</a>
      <nav class="features">
        <ul class="feature-list">
          <li><a href="chat.html">Chat with us</a></li>
          <li><a href="about.html">About us</a></li>
        </ul>
      </nav>
    </header>
    <div class="container">
      <div class="hero-section">
        <p class="amount">Enter amount</p>
        <br />
        <input class="amount-input" placeholder="Enter amount" type="number" required />
        <br /><br />
        <div class="exchange">
          <div class="from">
            <img src="https://flagsapi.com/US/flat/64.png" class="flags">
            <select class="exchange-from" name="from"></select>
          </div>
          <i class="fa-solid fa-arrow-right-arrow-left" id="exchange-country"></i>
          <div class="to">
            <img src="https://flagsapi.com/IN/flat/64.png" class="flags">
            <select class="exchange-to" name="to"></select>
          </div>
        </div>
        <br />
        <div class="last">
          <button class="convert-button">Calculate Conversion</button>
        </div>
        <br>
        <div class="msg"></div>
      </div>
    </div>
    <script src="code.js"></script>
    <script src="app.js"></script>
  </body>
</html>
